name: CI - Train Telco Churn Model

# Re-trains the model via MLflow Project on every push / manual trigger,
# stores the trained model as a GitHub artifact (Skilled), then builds a
# Docker image with `mlflow models build-docker` and pushes it to Docker Hub
# (Advanced).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: file:./mlruns
      HAS_DOCKER_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn==1.5.2 pandas==2.3.3 numpy==2.4.6 cloudpickle==3.1.2

      - name: Run MLflow Project (re-train model)
        working-directory: MLProject
        run: |
          mlflow run . --env-manager=local
          echo "RUN_ID=$(cat run_id.txt)" >> "$GITHUB_ENV"
          echo "Trained run id: $(cat run_id.txt)"

      - name: Upload trained model artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: telco-churn-model
          path: MLProject/mlruns/

      # ---------------- Advanced: Docker image to Docker Hub ----------------
      # These steps run only when the Docker Hub token secret is configured, so
      # the CI is green (train + artifact) even before the secret is added.
      - name: Log in to Docker Hub
        if: env.HAS_DOCKER_TOKEN == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Upgrade mlflow for the build step only: mlflow 2.19's docker base image
      # is ubuntu:20.04 (can't install modern Python/pip), and the conda
      # env-manager hits Anaconda's new Terms-of-Service gate. A current mlflow
      # uses a working base image + virtualenv, so build-docker succeeds. The
      # model itself is still trained/served with mlflow 2.19.
      - name: Upgrade mlflow for docker build
        if: env.HAS_DOCKER_TOKEN == 'true'
        run: pip install --upgrade "mlflow>=3.1"

      - name: Build Docker image from MLflow model
        if: env.HAS_DOCKER_TOKEN == 'true'
        working-directory: MLProject
        run: |
          mlflow models build-docker \
            --model-uri "runs:/$RUN_ID/model" \
            --name "${{ secrets.DOCKER_HUB_USERNAME }}/telco-churn-model" \
            --env-manager virtualenv

      - name: Push Docker image to Docker Hub
        if: env.HAS_DOCKER_TOKEN == 'true'
        run: |
          docker tag "${{ secrets.DOCKER_HUB_USERNAME }}/telco-churn-model" "${{ secrets.DOCKER_HUB_USERNAME }}/telco-churn-model:latest"
          docker push "${{ secrets.DOCKER_HUB_USERNAME }}/telco-churn-model:latest"
